{% extends "base.html" %}
{% block content %}
<div class="login_container">
    <h2 style="text-align: center; margin-bottom: 25px;">ログイン</h2>
    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label>{{ form.username.label }}</label>
            {{ form.username }}
            {% if form.username.errors %}
                <div style="color: #d7232f; font-size: 0.8rem; text-align: left;">
                    {{ form.username.errors }}
                </div>
            {% endif %}
        </div>

        <div class="form-group" style="margin-top: 15px;">
            <label>{{ form.password.label }}</label>
            {{ form.password }}
            {% if form.password.errors %}
                <div style="color: #d7232f; font-size: 0.8rem; text-align: left;">
                    {{ form.password.errors }}
                </div>
            {% endif %}
        </div>

        <button type="submit" class="btn-return" style="margin-top: 20px;">ログイン</button>
    </form>
</div>
{% endblock %}
