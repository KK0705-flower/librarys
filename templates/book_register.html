{% extends 'base.html' %}
{% block content %}
<div class="container">
    <h2>蔵書登録</h2>

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="search-section">
        <label for="manual-isbn">ISBNコードを入力：
            <input type="text" id="manual-isbn" placeholder="978..." value="{{ isbn|default:'' }}">
        </label>
        <button type="button" id="search-manual-btn">情報を取得</button>
    </div>

    <hr class="style-one">

    {% if book %}
    <form method="POST" class="registration-form" action="{% url 'book_register' %}">
        {% csrf_token %}
        
        <div class="book-preview">
            {% if book.cover_url %}
                <img src="{{ book.cover_url }}" alt="表紙">
                <input type="hidden" name="image_url" value="{{ book.cover_url }}">
            {% endif %}
        </div>

        <div>
            <label for="isbn-result">ISBN：</label>
            <input type="text" name="isbn" id="isbn-result" value="{{ book.isbn }}" readonly>
        </div>

        <div>
            <label for="book-title">タイトル：</label>
            <input type="text" name="title" id="book-title" value="{{ book.title }}">
        </div>

        <div>
            <label for="book-writer">著者：</label>
            <input type="text" name="writer" id="book-writer" value="{{ book.writer }}">
        </div>

        <div>
            <label for="book-publication-date">出版日：</label>
            <input type="text" name="book-publication-date" id="book-publication-date" value="{{ book.published_date }}">
        </div>

        <button type="submit" class="entry-button">蔵書を登録する</button>
    </form>
    {% else %}
    <p class="info-text">ISBNを入力して「情報を取得」を押してください。<br>
    <span>一日1000件まで登録可能です</span></p>
    {% endif %}
</div>

<script>
// 検索ボタンの処理を一つにまとめました
document.getElementById('search-manual-btn').addEventListener('click', () => {
    const isbnField = document.getElementById('manual-isbn');
    const val = isbnField.value.replace(/-/g, '').trim(); 

    if (val.length === 13 || val.length === 10) {
        // 現在のURLのパラメータを書き換えてリロード
        window.location.search = `?isbn=${val}`;
    } else {
        alert("ISBNは10桁または13桁で入力してください。");
    }
});

// メッセージを自動で消す処理
setTimeout(function() {
    const msg = document.querySelector('.messages');
    if (msg) {
        msg.style.opacity = '0';
        setTimeout(() => msg.style.display = 'none', 500);
    }
}, 3000);
</script>
{% endblock %}
