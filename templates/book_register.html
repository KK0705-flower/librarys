{% extends 'base.html' %}
{% load static %}

{% block content %}
    
<form method="POST">
    {% csrf_token %}

    <div>
        <label>ISBN：</label>
        <input type="text" name="isbn" id="manual-isbn" value="{{ book.isbn }}" placeholder="978...">
        <button type="button" id="search-manual-btn">情報を取得</button>
    </div>

    <div>
        <label>タイトル：</label>
        <input type="text" name="title" value="{{ book.title }}">
    </div>

    <div>
        <label>著者：</label>
        <input type="text" name="writer" value="{{ book.writer }}">
    </div>
    {% if cover_url %}
    <div style="margin-bottom: 20px;">
        <p>取得した表紙イメージ：</p>
        <img src="{{ cover_url }}" alt="表紙画像" style="max-width: 150px; border: 1px solid #ddd; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);">
    </div>
    {% endif %}
    <button type="submit">この内容で蔵書登録する</button>
</form>

<hr> 

{% if messages %}
    <div class="messages">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %} 
    </div>
{% endif %} 

<script>
// 「情報を取得」ボタンが押された時の処理
document.getElementById('search-manual-btn').addEventListener('click', () => {
    const isbnField = document.getElementById('manual-isbn');
    const val = isbnField.value.replace(/-/g, '').trim(); // ハイフンを除去

    if (val.length === 13 || val.length === 10) {
        // 現在のページにISBNをパラメータとして渡してリロード（ViewのGET処理が走る）
        window.location.href = `/book_register/?isbn=${val}`;
    } else {
        alert("ISBNは10桁または13桁で入力してください（現在は" + val.length + "桁です）");
    }
});
</script>
{% endblock %}
